
services:
  frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: inmogest-front
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://inmogest-back:3001
    env_file:
      - .env
    restart: always
    networks:
      - inmogest-network  # Misma red que el backend

# Usar la red externa que ya existe del backend
networks:
  inmogest-network:
    external: true
    name: inmogest-network